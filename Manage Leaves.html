<body>
    <nav class="sidebar">
        <div class="logo">HR Management System</div>
        <ul class="menu">
            <li class="menu-item"><a href="index.html">Home</a></li>
            <li class="menu-item"><a href="manage_employees.html">Manage Employees</a></li>

        </ul>
    </nav>
    
    <main class="main-content">
        <h1>Manage Leaves</h1>
        <button class="add-btn" onclick="openLeaveForm()">Add Leave</button>
        
        <table class="data-table">
            <thead>
                <tr>
                    <th>Employee Name</th>
                    <th>Leave Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="leaveTableBody">
                
            </tbody>
        </table>
    </main>

    
    <div id="leaveForm" style="display: none;">
        <h2 id="formTitle">Add Leave</h2>
        <form id="leaveModalForm">
            <label for="leaveName">Employee Name:</label>
            <input type="text" id="leaveName" required>

            <label for="leaveType">Leave Type:</label>
            <input type="text" id="leaveType" required>

            <label for="startDate">Start Date:</label>
            <input type="date" id="startDate" required>

            <label for="endDate">End Date:</label>
            <input type="date" id="endDate" required>

            <label for="status">Status:</label>
            <select id="status">
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>

            <button type="button" onclick="saveLeave()">Save</button>
            <button type="button" onclick="closeLeaveForm()">Cancel</button>
        </form>
    </div>

   
    <script src="script1.js"></script>
</body>
</html>
